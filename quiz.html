<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>線上答題系統 - 教學策略測驗</title>
  <style>
      * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
      }

      body {
          font-family: 'Microsoft JhengHei', Arial, sans-serif;
          background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
          min-height: 100vh;
          display: flex;
          justify-content: center;
          align-items: center;
          padding: 20px;
      }

      .container {
          background: white;
          border-radius: 20px;
          box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
          max-width: 700px;
          width: 100%;
          padding: 40px;
          position: relative;
      }

      .header {
          text-align: center;
          margin-bottom: 30px;
      }

      .header h1 {
          color: #667eea;
          font-size: 2.5em;
          margin-bottom: 10px;
      }

      .info-form {
          background: #f8f9fa;
          padding: 25px;
          border-radius: 15px;
          margin-bottom: 30px;
      }

      .form-group {
          margin-bottom: 20px;
      }

      .form-group label {
          display: block;
          font-weight: bold;
          margin-bottom: 8px;
          color: #333;
          font-size: 1.1em;
      }

      .form-group input,
      .form-group select {
          width: 100%;
          padding: 12px;
          border: 2px solid #ddd;
          border-radius: 8px;
          font-size: 1em;
          transition: border-color 0.3s;
      }

      .form-group input:focus,
      .form-group select:focus {
          outline: none;
          border-color: #667eea;
      }

      .progress-bar {
          width: 100%;
          height: 10px;
          background: #e0e0e0;
          border-radius: 10px;
          margin: 20px 0;
          overflow: hidden;
      }

      .progress-fill {
          height: 100%;
          background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
          width: 0%;
          transition: width 0.3s ease;
      }

      .quiz-info {
          display: flex;
          justify-content: space-between;
          margin-bottom: 20px;
          font-size: 1.1em;
          color: #666;
      }

      .question-container {
          margin: 30px 0;
      }

      .question {
          font-size: 1.5em;
          color: #333;
          margin-bottom: 25px;
          font-weight: bold;
          line-height: 1.5;
      }

      .options {
          display: flex;
          flex-direction: column;
          gap: 15px;
      }

      .option {
          background: #f5f5f5;
          padding: 20px;
          border-radius: 10px;
          cursor: pointer;
          transition: all 0.3s ease;
          border: 2px solid transparent;
          font-size: 1.1em;
          line-height: 1.6;
      }

      .option:hover {
          background: #e8e8e8;
          transform: translateX(5px);
      }

      .option.selected {
          background: #667eea;
          color: white;
          border-color: #764ba2;
      }

      .option.correct {
          background: #4caf50;
          color: white;
          border-color: #45a049;
          animation: correctPulse 0.5s ease;
      }

      .option.wrong {
          background: #f44336;
          color: white;
          border-color: #da190b;
          animation: shake 0.5s ease;
      }

      .button-container {
          display: flex;
          justify-content: center;
          gap: 15px;
          margin-top: 30px;
          flex-wrap: wrap;
      }

      .btn {
          background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
          color: white;
          border: none;
          padding: 15px 40px;
          font-size: 1.2em;
          border-radius: 50px;
          cursor: pointer;
          transition: transform 0.2s ease;
          font-weight: bold;
      }

      .btn:hover {
          transform: scale(1.05);
      }

      .btn:disabled {
          background: #ccc;
          cursor: not-allowed;
          transform: none;
      }

      .btn-secondary {
          background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
      }

      .result-container {
          text-align: center;
          display: none;
      }

      .result-container.show {
          display: block;
      }

      .score {
          font-size: 4em;
          color: #667eea;
          margin: 30px 0;
          font-weight: bold;
      }

      .result-message {
          font-size: 1.5em;
          color: #333;
          margin: 20px 0;
      }

      .answer-summary {
          background: #f8f9fa;
          padding: 25px;
          border-radius: 15px;
          margin: 25px 0;
          text-align: left;
      }

      .answer-item {
          padding: 15px;
          margin: 10px 0;
          border-radius: 8px;
          background: white;
      }

      .answer-item.correct {
          border-left: 5px solid #4caf50;
      }

      .answer-item.wrong {
          border-left: 5px solid #f44336;
      }

      .answer-item h4 {
          color: #667eea;
          margin-bottom: 8px;
          line-height: 1.6;
      }

      .answer-detail {
          font-size: 0.95em;
          color: #666;
          margin-top: 5px;
          line-height: 1.5;
      }

      .upload-status {
          margin-top: 20px;
          padding: 15px;
          border-radius: 8px;
          display: none;
      }

      .upload-status.success {
          background: #d4edda;
          color: #155724;
          display: block;
      }

      .upload-status.error {
          background: #f8d7da;
          color: #721c24;
          display: block;
      }

      .upload-status.loading {
          background: #cce5ff;
          color: #004085;
          display: block;
      }

      .start-section {
          display: block;
      }

      .start-section.hide {
          display: none;
      }

      /* 答對彈出動畫 */
      .success-popup {
          position: fixed;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%) scale(0);
          z-index: 9999;
          background: white;
          padding: 40px;
          border-radius: 20px;
          box-shadow: 0 10px 50px rgba(0, 0, 0, 0.3);
          text-align: center;
          opacity: 0;
          pointer-events: none;
      }

      .success-popup.show {
          animation: popupShow 1.5s ease forwards;
      }

      .success-popup img {
          width: 200px;
          height: 200px;
          object-fit: contain;
          margin-bottom: 20px;
      }

      .success-popup .emoji {
          font-size: 150px;
          margin-bottom: 20px;
          animation: bounce 0.6s ease infinite alternate;
      }

      .success-popup h2 {
          color: #4caf50;
          font-size: 2.5em;
          margin-bottom: 10px;
      }

      .success-popup p {
          color: #666;
          font-size: 1.3em;
      }

      /* 答錯彈出動畫 */
      .wrong-popup {
          position: fixed;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%) scale(0);
          z-index: 9999;
          background: white;
          padding: 40px;
          border-radius: 20px;
          box-shadow: 0 10px 50px rgba(0, 0, 0, 0.3);
          text-align: center;
          opacity: 0;
          pointer-events: none;
      }

      .wrong-popup.show {
          animation: popupShow 1.5s ease forwards;
      }

      .wrong-popup .emoji {
          font-size: 150px;
          margin-bottom: 20px;
      }

      .wrong-popup h2 {
          color: #f44336;
          font-size: 2.5em;
          margin-bottom: 10px;
      }

      .wrong-popup p {
          color: #666;
          font-size: 1.3em;
      }

      /* 遮罩層 */
      .overlay {
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background: rgba(0, 0, 0, 0.5);
          z-index: 9998;
          opacity: 0;
          pointer-events: none;
          transition: opacity 0.3s ease;
      }

      .overlay.show {
          opacity: 1;
          pointer-events: auto;
      }

      /* 動畫效果 */
      @keyframes popupShow {
          0% {
              transform: translate(-50%, -50%) scale(0);
              opacity: 0;
          }
          50% {
              transform: translate(-50%, -50%) scale(1.1);
              opacity: 1;
          }
          70% {
              transform: translate(-50%, -50%) scale(0.95);
          }
          100% {
              transform: translate(-50%, -50%) scale(0);
              opacity: 0;
          }
      }

      @keyframes bounce {
          from {
              transform: translateY(0);
          }
          to {
              transform: translateY(-20px);
          }
      }

      @keyframes correctPulse {
          0%, 100% {
              transform: scale(1);
          }
          50% {
              transform: scale(1.05);
          }
      }

      @keyframes shake {
          0%, 100% {
              transform: translateX(0);
          }
          25% {
              transform: translateX(-10px);
          }
          75% {
              transform: translateX(10px);
          }
      }

      @media (max-width: 600px) {
          .container {
              padding: 20px;
          }

          .header h1 {
              font-size: 1.8em;
          }

          .question {
              font-size: 1.2em;
          }

          .option {
              padding: 15px;
              font-size: 1em;
          }

          .score {
              font-size: 3em;
          }

          .button-container {
              flex-direction: column;
          }

          .success-popup, .wrong-popup {
              padding: 30px 20px;
              width: 90%;
          }

          .success-popup .emoji, .wrong-popup .emoji {
              font-size: 100px;
          }

          .success-popup h2, .wrong-popup h2 {
              font-size: 2em;
          }

          .success-popup img {
              width: 150px;
              height: 150px;
          }
      }
  </style>
</head>
<body>
  <!-- 遮罩層 -->
  <div class="overlay" id="overlay"></div>

  <!-- 答對彈出視窗 -->
  <div class="success-popup" id="successPopup">
      <img src="O.png" alt="答對">
      <h2>答對了！</h2>
      <p>太棒了！繼續加油！</p>
  </div>

  <!-- 答錯彈出視窗 -->
  <div class="wrong-popup" id="wrongPopup">
      <img src="X.png" alt="答錯">
      <h2>再接再厲！</h2>
      <p>沒關係，繼續努力！</p>
  </div>

  <div class="container">
      <div class="header">
          <h1>📝 教學策略測驗</h1>
          <p style="color: #666;">答題結果將自動上傳到雲端</p>
      </div>

      <div id="startSection" class="start-section">
          <div class="info-form">
              <h3 style="margin-bottom: 20px; color: #667eea;">請填寫基本資料</h3>
              <div class="form-group">
                  <label for="userName">姓名 *</label>
                  <input type="text" id="userName" placeholder="請輸入您的姓名" required>
              </div>
              <div class="form-group">
                  <label for="userEmail">電子郵件</label>
                  <input type="email" id="userEmail" placeholder="example@email.com">
              </div>
              <div class="form-group">
                  <label for="userClass">班級/組別</label>
                  <input type="text" id="userClass" placeholder="例如：三年一班">
              </div>
              <div class="form-group">
                  <label for="userID">學號/編號</label>
                  <input type="text" id="userID" placeholder="請輸入學號或編號">
              </div>
          </div>
          <div class="button-container">
              <button class="btn" onclick="startQuiz()">開始答題</button>
          </div>
      </div>

      <div id="quizSection" style="display: none;">
          <div class="progress-bar">
              <div class="progress-fill" id="progressBar"></div>
          </div>

          <div class="quiz-info">
              <span>題目 <span id="currentQuestion">1</span> / <span id="totalQuestions">8</span></span>
              <span>已答題數: <span id="answeredCount">0</span></span>
          </div>

          <div class="question-container">
              <div class="question" id="question"></div>
              <div class="options" id="options"></div>
          </div>

          <div class="button-container">
              <button class="btn" id="prevBtn" onclick="prevQuestion()" style="display: none;">上一題</button>
              <button class="btn" id="nextBtn" onclick="nextQuestion()">下一題</button>
          </div>
      </div>

      <div class="result-container" id="resultSection">
          <h2 class="result-message">🎉 測驗完成！</h2>
          <div class="score" id="finalScore"></div>
          <p class="result-message" id="resultMessage"></p>

          <div class="upload-status" id="uploadStatus"></div>

          <div class="answer-summary" id="answerSummary"></div>

          <div style="margin-top: 30px; padding: 20px; background: #e3f2fd; border-radius: 10px;">
              <h3 style="color: #667eea; margin-bottom: 15px;">📥 下載答題記錄</h3>
              <div class="button-container">
                  <button class="btn btn-secondary" onclick="downloadResults()">下載 TXT</button>
                  <button class="btn btn-secondary" onclick="downloadCSV()">下載 CSV</button>
              </div>
          </div>

          <div class="button-container" style="margin-top: 30px;">
              <button class="btn" onclick="restartQuiz()">重新開始</button>
          </div>
      </div>
  </div>

  <script>
      const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwuOzxvqCfvkfxvxUPJXB9MOARMol2GoGEGZ4NBMhlmdXEIOzEy1TLSxaZTuDWH4Y57jQ/exec';
      
      // 題庫資料 - 教學策略測驗
      const quizData = [
          {
              question: "下列何者最能說明「教學策略」的意義？",
              options: [
                  "教師在課堂中臨時想到的教學活動",
                  "為達成課程目標，對內容、流程、教材與評量進行的整體規劃",
                  "學生自行選擇喜歡的學習工具",
                  "只負責設計期末考試題目"
              ],
              correct: 1
          },
          {
              question: "關於「教學策略」與「教學方法」的差異，下列敘述何者正確？",
              options: [
                  "教學策略偏向整體規劃，教學方法偏向具體教學做法",
                  "教學策略只適用於實體課程，教學方法只適用於線上課程",
                  "教學策略與教學方法完全相同，沒有任何差異",
                  "教學方法只負責評量，教學策略只負責點名"
              ],
              correct: 0
          },
          {
              question: "下列何者屬於設計數位課程內容架構的正確步驟？",
              options: [
                  "隨機安排單元內容，不需要考慮學習順序",
                  "先進行期末考，再決定課程主題",
                  "劃分課程單元、規劃課程大綱、繪製課程概念圖、規劃學習流程",
                  "只要選擇漂亮的背景圖片即可完成課程架構設計"
              ],
              correct: 2
          },
          {
              question: "下列何者屬於設計數位課程內容架構的正確步驟？",
              options: [
                  "隨機安排單元內容，不需要考慮學習順序",
                  "先進行期末考，再決定課程主題",
                  "劃分課程單元、規劃課程大綱、繪製課程概念圖、規劃學習流程",
                  "只要選擇漂亮的背景圖片即可完成課程架構設計"
              ],
              correct: 2
          },
          {
              question: "下列何者屬於「導覽式」數位教材的適合應用？",
              options: [
                  "使用螢幕錄製示範軟體操作流程",
                  "只提供一份紙本講義",
                  "讓學生完全不看教材，只自行猜測操作方式",
                  "只用口頭說明，不提供任何畫面或步驟"
              ],
              correct: 0
          },
          {
              question: "下列何者屬於「前測」的主要目的？",
              options: [
                  "在教學前了解學習者的先備知識與能力",
                  "在課程結束後才決定教學目標",
                  "用來取代所有教學活動",
                  "只用來統計學生出席率"
              ],
              correct: 0
          },
          {
              question: "下列何者最能說明數位教材中「介面設計」的主要目的？",
              options: [
                  "讓教材畫面越複雜越好，增加學習者操作挑戰",
                  "讓學習者能清楚操作教材、掌握進度，並專注於學習內容",
                  "只負責決定教材中的考試分數與配分方式",
                  "讓所有功能都隱藏起來，避免學習者使用太多工具"
              ],
              correct: 1
          },
          {
              question: "下列何者最符合數位教材中「腳本設計」的意義？",
              options: [
                  "只負責設計教材封面圖片，不需要考慮內容與互動",
                  "將學習內容、畫面設計、多媒體素材與互動方式具體寫成開發文件",
                  "只記錄學生的出席情形與成績",
                  "只安排教室座位與上課時間"
              ],
              correct: 1
          }
      ];

      let currentQuestionIndex = 0;
      let userAnswers = [];
      let userInfo = {};
      let isAnswered = false;

      function startQuiz() {
          const name = document.getElementById('userName').value.trim();
          
          if (!name) {
              alert('請輸入姓名！');
              return;
          }

          userInfo = {
              name: name,
              email: document.getElementById('userEmail').value.trim(),
              class: document.getElementById('userClass').value.trim(),
              id: document.getElementById('userID').value.trim(),
              startTime: new Date().toLocaleString('zh-TW')
          };

          document.getElementById('startSection').classList.add('hide');
          document.getElementById('quizSection').style.display = 'block';
          
          userAnswers = new Array(quizData.length).fill(null);
          initQuiz();
      }

      function initQuiz() {
          document.getElementById('totalQuestions').textContent = quizData.length;
          loadQuestion();
      }

      function loadQuestion() {
          isAnswered = false;
          const current = quizData[currentQuestionIndex];
          document.getElementById('question').textContent = `${currentQuestionIndex + 1}. ${current.question}`;
          document.getElementById('currentQuestion').textContent = currentQuestionIndex + 1;
          
          const optionsContainer = document.getElementById('options');
          optionsContainer.innerHTML = '';
          
          current.options.forEach((option, index) => {
              const optionDiv = document.createElement('div');
              optionDiv.className = 'option';
              if (userAnswers[currentQuestionIndex] === index) {
                  optionDiv.classList.add('selected');
              }
              optionDiv.textContent = `${String.fromCharCode(65 + index)}. ${option}`;
              optionDiv.onclick = () => selectOption(index);
              optionsContainer.appendChild(optionDiv);
          });

          updateProgress();
          updateButtons();
          updateAnsweredCount();
      }

      function selectOption(index) {
          if (isAnswered) return;
          
          isAnswered = true;
          userAnswers[currentQuestionIndex] = index;
          
          const options = document.querySelectorAll('.option');
          const current = quizData[currentQuestionIndex];
          const isCorrect = index === current.correct;
          
          // 標記選擇的答案
          options.forEach(opt => opt.classList.remove('selected'));
          options[index].classList.add(isCorrect ? 'correct' : 'wrong');
          
          // 顯示正確答案
          if (!isCorrect) {
              options[current.correct].classList.add('correct');
          }
          
          // 顯示彈出動畫
          showPopup(isCorrect);
          
          updateAnsweredCount();
          
          // 1.5秒後自動進入下一題
          setTimeout(() => {
              if (currentQuestionIndex < quizData.length - 1) {
                  currentQuestionIndex++;
                  loadQuestion();
              } else {
                  showResults();
              }
          }, 1500);
      }

      function showPopup(isCorrect) {
          const overlay = document.getElementById('overlay');
          const popup = isCorrect ? document.getElementById('successPopup') : document.getElementById('wrongPopup');
          
          overlay.classList.add('show');
          popup.classList.add('show');
          
          // 1.5秒後隱藏
          setTimeout(() => {
              overlay.classList.remove('show');
              popup.classList.remove('show');
          }, 1500);
      }

      function prevQuestion() {
          if (currentQuestionIndex > 0) {
              currentQuestionIndex--;
              loadQuestion();
          }
      }

      function nextQuestion() {
          if (currentQuestionIndex < quizData.length - 1) {
              currentQuestionIndex++;
              loadQuestion();
          } else {
              showResults();
          }
      }

      function updateButtons() {
          document.getElementById('prevBtn').style.display = 
              currentQuestionIndex > 0 ? 'inline-block' : 'none';
          
          document.getElementById('nextBtn').textContent = 
              currentQuestionIndex === quizData.length - 1 ? '提交答案' : '下一題';
      }

      function updateAnsweredCount() {
          const answered = userAnswers.filter(a => a !== null).length;
          document.getElementById('answeredCount').textContent = answered;
      }

      function updateProgress() {
          const progress = ((currentQuestionIndex + 1) / quizData.length) * 100;
          document.getElementById('progressBar').style.width = progress + '%';
      }

      async function showResults() {
          userInfo.endTime = new Date().toLocaleString('zh-TW');
          
          let score = 0;
          quizData.forEach((q, index) => {
              if (userAnswers[index] === q.correct) {
                  score += 10;
              }
          });

          document.getElementById('quizSection').style.display = 'none';
          document.getElementById('resultSection').classList.add('show');
          document.getElementById('finalScore').textContent = score + ' / ' + (quizData.length * 10);
          
          const percentage = (score / (quizData.length * 10)) * 100;
          let message = '';
          
          if (percentage === 100) {
              message = '完美！你答對了所有題目！🏆';
          } else if (percentage >= 80) {
              message = '太棒了！你的表現非常優秀！⭐';
          } else if (percentage >= 60) {
              message = '不錯！繼續加油！💪';
          } else {
              message = '再接再厲！多練習就會進步！📚';
          }
          
          document.getElementById('resultMessage').textContent = message;
          showAnswerSummary();
          
          // 自動上傳到試算表
          await uploadToSheet();
      }

      function showAnswerSummary() {
          const summaryContainer = document.getElementById('answerSummary');
          summaryContainer.innerHTML = '<h3 style="color: #667eea; margin-bottom: 15px;">📋 答題詳情</h3>';
          
          quizData.forEach((q, index) => {
              const userAnswer = userAnswers[index];
              const isCorrect = userAnswer === q.correct;
              
              const answerItem = document.createElement('div');
              answerItem.className = `answer-item ${isCorrect ? 'correct' : 'wrong'}`;
              
              answerItem.innerHTML = `
                  <h4>第 ${index + 1} 題：${q.question}</h4>
                  <div class="answer-detail">
                      <strong>你的答案：</strong>${userAnswer !== null ? String.fromCharCode(65 + userAnswer) + '. ' + q.options[userAnswer] : '未作答'} 
                      ${isCorrect ? '✓' : '✗'}
                  </div>
                  ${!isCorrect ? `<div class="answer-detail"><strong>正確答案：</strong>${String.fromCharCode(65 + q.correct)}. ${q.options[q.correct]}</div>` : ''}
              `;
              
              summaryContainer.appendChild(answerItem);
          });
      }

      async function uploadToSheet() {
          const statusDiv = document.getElementById('uploadStatus');
          statusDiv.className = 'upload-status loading';
          statusDiv.textContent = '⏳ 正在自動上傳到 Google 試算表...';

          let score = 0;
          let correctCount = 0;
          let details = '';

          quizData.forEach((q, index) => {
              const userAnswer = userAnswers[index];
              const isCorrect = userAnswer === q.correct;
              if (isCorrect) {
                  score += 10;
                  correctCount++;
              }
              details += `Q${index + 1}: ${userAnswer !== null ? String.fromCharCode(65 + userAnswer) : '未作答'} (${isCorrect ? '✓' : '✗'}); `;
          });

          const data = {
              timestamp: new Date().toLocaleString('zh-TW'),
              name: userInfo.name,
              email: userInfo.email || '-',
              class: userInfo.class || '-',
              id: userInfo.id || '-',
              score: score,
              correctCount: correctCount,
              details: details
          };

          try {
              const response = await fetch(SCRIPT_URL, {
                  method: 'POST',
                  mode: 'no-cors',
                  headers: {
                      'Content-Type': 'application/json',
                  },
                  body: JSON.stringify(data)
              });

              statusDiv.className = 'upload-status success';
              statusDiv.textContent = '✅ 上傳成功！結果已自動儲存到 Google 試算表';
          } catch (error) {
              statusDiv.className = 'upload-status error';
              statusDiv.textContent = '❌ 自動上傳失敗：' + error.message + '\n請聯絡管理員或稍後下載檔案';
          }
      }

      function downloadResults() {
          let content = '='.repeat(50) + '\n';
          content += '教學策略測驗 - 答題結果\n';
          content += '='.repeat(50) + '\n\n';
          
          content += '【基本資料】\n';
          content += `姓名：${userInfo.name}\n`;
          if (userInfo.email) content += `電子郵件：${userInfo.email}\n`;
          if (userInfo.class) content += `班級/組別：${userInfo.class}\n`;
          if (userInfo.id) content += `學號/編號：${userInfo.id}\n`;
          content += `開始時間：${userInfo.startTime}\n`;
          content += `結束時間：${userInfo.endTime}\n\n`;
          
          let score = 0;
          quizData.forEach((q, index) => {
              if (userAnswers[index] === q.correct) score += 10;
          });
          
          content += '【測驗結果】\n';
          content += `總分：${score} / ${quizData.length * 10}\n`;
          content += `答對題數：${userAnswers.filter((a, i) => a === quizData[i].correct).length} / ${quizData.length}\n\n`;
          
          content += '【答題詳情】\n';
          content += '-'.repeat(50) + '\n';
          
          quizData.forEach((q, index) => {
              const userAnswer = userAnswers[index];
              const isCorrect = userAnswer === q.correct;
              
              content += `\n第 ${index + 1} 題：${q.question}\n`;
              content += `你的答案：${userAnswer !== null ? String.fromCharCode(65 + userAnswer) + '. ' + q.options[userAnswer] : '未作答'} ${isCorrect ? '✓ 正確' : '✗ 錯誤'}\n`;
              if (!isCorrect) {
                  content += `正確答案：${String.fromCharCode(65 + q.correct)}. ${q.options[q.correct]}\n`;
              }
              content += '-'.repeat(50) + '\n';
          });
          
          const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
          const link = document.createElement('a');
          link.href = URL.createObjectURL(blob);
          link.download = `教學策略測驗_${userInfo.name}_${new Date().getTime()}.txt`;
          link.click();
      }

      function downloadCSV() {
          let csv = '\uFEFF';
          csv += '題號,題目,你的答案,正確答案,結果\n';
          
          quizData.forEach((q, index) => {
              const userAnswer = userAnswers[index];
              const isCorrect = userAnswer === q.correct;
              
              csv += `${index + 1},"${q.question}",`;
              csv += `"${userAnswer !== null ? String.fromCharCode(65 + userAnswer) + '. ' + q.options[userAnswer] : '未作答'}",`;
              csv += `"${String.fromCharCode(65 + q.correct)}. ${q.options[q.correct]}",`;
              csv += `${isCorrect ? '正確' : '錯誤'}\n`;
          });
          
          const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
          const link = document.createElement('a');
          link.href = URL.createObjectURL(blob);
          link.download = `教學策略測驗_${userInfo.name}_${new Date().getTime()}.csv`;
          link.click();
      }

      function restartQuiz() {
          currentQuestionIndex = 0;
          userAnswers = [];
          userInfo = {};
          isAnswered = false;
          
          document.getElementById('userName').value = '';
          document.getElementById('userEmail').value = '';
          document.getElementById('userClass').value = '';
          document.getElementById('userID').value = '';
          
          document.getElementById('resultSection').classList.remove('show');
          document.getElementById('startSection').classList.remove('hide');
          document.getElementById('uploadStatus').className = 'upload-status';
      }
  </script>
</body>
</html>
