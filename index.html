<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>線上答題系統</title>
  <style>
      * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
      }

      body {
          font-family: 'Microsoft JhengHei', Arial, sans-serif;
          background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
          min-height: 100vh;
          display: flex;
          justify-content: center;
          align-items: center;
          padding: 20px;
      }

      .container {
          background: white;
          border-radius: 20px;
          box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
          max-width: 700px;
          width: 100%;
          padding: 40px;
      }

      .header {
          text-align: center;
          margin-bottom: 30px;
      }

      .header h1 {
          color: #667eea;
          font-size: 2.5em;
          margin-bottom: 10px;
      }

      .progress-bar {
          width: 100%;
          height: 10px;
          background: #e0e0e0;
          border-radius: 10px;
          margin: 20px 0;
          overflow: hidden;
      }

      .progress-fill {
          height: 100%;
          background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
          width: 0%;
          transition: width 0.3s ease;
      }

      .quiz-info {
          display: flex;
          justify-content: space-between;
          margin-bottom: 20px;
          font-size: 1.1em;
          color: #666;
      }

      .question-container {
          margin: 30px 0;
      }

      .question {
          font-size: 1.5em;
          color: #333;
          margin-bottom: 25px;
          font-weight: bold;
      }

      .options {
          display: flex;
          flex-direction: column;
          gap: 15px;
      }

      .option {
          background: #f5f5f5;
          padding: 20px;
          border-radius: 10px;
          cursor: pointer;
          transition: all 0.3s ease;
          border: 2px solid transparent;
          font-size: 1.1em;
      }

      .option:hover {
          background: #e8e8e8;
          transform: translateX(5px);
      }

      .option.selected {
          background: #667eea;
          color: white;
          border-color: #764ba2;
      }

      .option.correct {
          background: #4caf50;
          color: white;
          border-color: #45a049;
      }

      .option.wrong {
          background: #f44336;
          color: white;
          border-color: #da190b;
      }

      .option.disabled {
          cursor: not-allowed;
          opacity: 0.7;
      }

      .button-container {
          display: flex;
          justify-content: center;
          margin-top: 30px;
      }

      .btn {
          background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
          color: white;
          border: none;
          padding: 15px 40px;
          font-size: 1.2em;
          border-radius: 50px;
          cursor: pointer;
          transition: transform 0.2s ease;
          font-weight: bold;
      }

      .btn:hover {
          transform: scale(1.05);
      }

      .btn:disabled {
          background: #ccc;
          cursor: not-allowed;
          transform: none;
      }

      .result-container {
          text-align: center;
          display: none;
      }

      .result-container.show {
          display: block;
      }

      .score {
          font-size: 4em;
          color: #667eea;
          margin: 30px 0;
          font-weight: bold;
      }

      .result-message {
          font-size: 1.5em;
          color: #333;
          margin: 20px 0;
      }

      .restart-btn {
          margin-top: 30px;
      }

      .feedback {
          margin-top: 15px;
          padding: 15px;
          border-radius: 10px;
          font-size: 1.1em;
          display: none;
      }

      .feedback.show {
          display: block;
      }

      .feedback.correct {
          background: #d4edda;
          color: #155724;
      }

      .feedback.wrong {
          background: #f8d7da;
          color: #721c24;
      }

      @media (max-width: 600px) {
          .container {
              padding: 20px;
          }

          .header h1 {
              font-size: 1.8em;
          }

          .question {
              font-size: 1.2em;
          }

          .option {
              padding: 15px;
              font-size: 1em;
          }

          .score {
              font-size: 3em;
          }
      }
  </style>
</head>
<body>
  <div class="container">
      <div class="header">
          <h1>📝 線上答題系統</h1>
      </div>

      <div id="quizSection">
          <div class="progress-bar">
              <div class="progress-fill" id="progressBar"></div>
          </div>

          <div class="quiz-info">
              <span>題目 <span id="currentQuestion">1</span> / <span id="totalQuestions">5</span></span>
              <span>得分: <span id="score">0</span></span>
          </div>

          <div class="question-container">
              <div class="question" id="question"></div>
              <div class="options" id="options"></div>
              <div class="feedback" id="feedback"></div>
          </div>

          <div class="button-container">
              <button class="btn" id="nextBtn" onclick="nextQuestion()" disabled>下一題</button>
          </div>
      </div>

      <div class="result-container" id="resultSection">
          <h2 class="result-message">🎉 測驗完成！</h2>
          <div class="score" id="finalScore"></div>
          <p class="result-message" id="resultMessage"></p>
          <button class="btn restart-btn" onclick="restartQuiz()">重新開始</button>
      </div>
  </div>

  <script>
      // 題庫資料 - 你可以在這裡修改或新增題目
      const quizData = [
          {
              question: "台灣最高的山是哪一座？",
              options: ["玉山", "雪山", "合歡山", "阿里山"],
              correct: 0
          },
          {
              question: "以下哪個不是台灣的直轄市？",
              options: ["台北市", "新竹市", "高雄市", "台南市"],
              correct: 1
          },
          {
              question: "珍珠奶茶起源於台灣哪個城市？",
              options: ["台北", "台中", "台南", "高雄"],
              correct: 1
          },
          {
              question: "台灣的國花是什麼？",
              options: ["櫻花", "梅花", "蓮花", "牡丹"],
              correct: 1
          },
          {
              question: "以下哪個是台灣的傳統節慶？",
              options: ["聖誕節", "感恩節", "端午節", "萬聖節"],
              correct: 2
          }
      ];

      let currentQuestionIndex = 0;
      let score = 0;
      let selectedAnswer = null;

      // 初始化測驗
      function initQuiz() {
          document.getElementById('totalQuestions').textContent = quizData.length;
          loadQuestion();
      }

      // 載入題目
      function loadQuestion() {
          const current = quizData[currentQuestionIndex];
          document.getElementById('question').textContent = current.question;
          document.getElementById('currentQuestion').textContent = currentQuestionIndex + 1;
          
          const optionsContainer = document.getElementById('options');
          optionsContainer.innerHTML = '';
          
          current.options.forEach((option, index) => {
              const optionDiv = document.createElement('div');
              optionDiv.className = 'option';
              optionDiv.textContent = option;
              optionDiv.onclick = () => selectOption(index);
              optionsContainer.appendChild(optionDiv);
          });

          document.getElementById('feedback').classList.remove('show');
          document.getElementById('nextBtn').disabled = true;
          selectedAnswer = null;

          updateProgress();
      }

      // 選擇答案
      function selectOption(index) {
          if (selectedAnswer !== null) return;

          selectedAnswer = index;
          const options = document.querySelectorAll('.option');
          const current = quizData[currentQuestionIndex];
          const feedback = document.getElementById('feedback');

          options.forEach(opt => opt.classList.add('disabled'));
          
          if (index === current.correct) {
              options[index].classList.add('correct');
              score += 10;
              document.getElementById('score').textContent = score;
              feedback.textContent = '✓ 答對了！太棒了！';
              feedback.className = 'feedback correct show';
          } else {
              options[index].classList.add('wrong');
              options[current.correct].classList.add('correct');
              feedback.textContent = '✗ 答錯了！正確答案是：' + current.options[current.correct];
              feedback.className = 'feedback wrong show';
          }

          document.getElementById('nextBtn').disabled = false;
      }

      // 下一題
      function nextQuestion() {
          currentQuestionIndex++;
          
          if (currentQuestionIndex < quizData.length) {
              loadQuestion();
          } else {
              showResults();
          }
      }

      // 更新進度條
      function updateProgress() {
          const progress = ((currentQuestionIndex + 1) / quizData.length) * 100;
          document.getElementById('progressBar').style.width = progress + '%';
      }

      // 顯示結果
      function showResults() {
          document.getElementById('quizSection').style.display = 'none';
          document.getElementById('resultSection').classList.add('show');
          document.getElementById('finalScore').textContent = score + ' / ' + (quizData.length * 10);
          
          const percentage = (score / (quizData.length * 10)) * 100;
          let message = '';
          
          if (percentage === 100) {
              message = '完美！你答對了所有題目！🏆';
          } else if (percentage >= 80) {
              message = '太棒了！你的表現非常優秀！⭐';
          } else if (percentage >= 60) {
              message = '不錯！繼續加油！💪';
          } else {
              message = '再接再厲！多練習就會進步！📚';
          }
          
          document.getElementById('resultMessage').textContent = message;
      }

      // 重新開始
      function restartQuiz() {
          currentQuestionIndex = 0;
          score = 0;
          selectedAnswer = null;
          document.getElementById('score').textContent = '0';
          document.getElementById('quizSection').style.display = 'block';
          document.getElementById('resultSection').classList.remove('show');
          initQuiz();
      }

      // 啟動測驗
      initQuiz();
  </script>
</body>
</html>
